  }
  document.getElementById("f").addEventListener("submit", function (e) {
    e.preventDefault();
    // trim: passwords pasted from chat apps often carry a stray space/newline
    var pw = document.getElementById("pw").value.trim();
    if (!pw) return;
    msg.textContent = "deriving key\u2026";
    unlock(pw).catch(function () {
      msg.textContent = "wrong password";
      document.getElementById("pw").select();
    });
  });
  var cached = sessionStorage.getItem("entrans_pw");
  if (cached) {
    msg.textContent = "unlocking\u2026";
    unlock(cached).catch(function () {
      sessionStorage.removeItem("entrans_pw");
      msg.textContent = "";
    });
  }
})();
</script>
</body>
</html>
