  var msg = document.getElementById("msg");
  var b64 = function (s) {
    var bin = atob(s), a = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) a[i] = bin.charCodeAt(i);
    return a;
  };
  function unlock(pw) {
    var enc = new TextEncoder();
    return crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"])
      .then(function (km) {
        return crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: b64(PAYLOAD.salt), iterations: PAYLOAD.iter, hash: "SHA-256" },
          km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
      })
      .then(function (key) {
        return crypto.subtle.decrypt({ name: "AES-GCM", iv: b64(PAYLOAD.nonce) }, key, b64(PAYLOAD.ct));
      })
      .then(function (buf) {
        sessionStorage.setItem("entrans_pw", pw);
        var htmlText = new TextDecoder().decode(buf);
        document.open();
        document.write(htmlText);
        document.close();
      });
  }
  if (!(window.crypto && crypto.subtle)) {
    msg.textContent = "this browser can't decrypt \u2014 update it or use another";
  }
  document.getElementById("f").addEventListener("submit", function (e) {
    e.preventDefault();
    // trim: passwords pasted from chat apps often carry a stray space/newline
    var pw = document.getElementById("pw").value.trim();
    if (!pw) return;
    msg.textContent = "deriving key\u2026";
    unlock(pw).catch(function () {
      msg.textContent = "wrong password";
      document.getElementById("pw").select();
    });
  });
  var cached = sessionStorage.getItem("entrans_pw");
  if (cached) {
    msg.textContent = "unlocking\u2026";
    unlock(cached).catch(function () {
      sessionStorage.removeItem("entrans_pw");
      msg.textContent = "";
    });
  }
